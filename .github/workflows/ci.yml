name: aivox CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install workspace dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate --schema packages/core/prisma/schema.prisma
        env:
          # Syntactically valid placeholder — prisma generate needs a parseable URL
          # but never opens a real connection during code generation.
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Type-check packages/core
        run: npx tsc --noEmit -p packages/core/tsconfig.json

      - name: Type-check apps/api
        run: npx tsc --noEmit -p apps/api/tsconfig.json

      - name: Test packages/core
        run: npm run test --workspace=packages/core

      - name: Test apps/api
        run: npm run test --workspace=apps/api
      # Раздел 25 ТЗ, Этап 0: "ворота" этапа — golden test и forbidden responses
      # обязаны быть зелёными. Этот job делается required check в настройках репозитория,
      # чтобы merge в main был физически невозможен при красном тесте.
      # Integration/DB-тесты (требующие ANTHROPIC_API_KEY и DATABASE_URL) корректно
      # пропускаются через skipIf — секреты в этот workflow намеренно не добавлены.
